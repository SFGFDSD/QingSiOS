          <div class="storage-stat"><span class="num">${fmtSize(s.totalSize)}</span><span class="lbl">总量</span></div>
          <div class="storage-stat"><span class="num">${drafts.length}</span><span class="lbl">草稿</span></div>
        </div>
      </div>

      <div class="storage-card">
        <h3>类型分布</h3>
        <div class="storage-stats">
          <div class="storage-stat"><span class="num">${s.typeCount.text || 0}</span><span class="lbl">文 · 文本</span></div>
          <div class="storage-stat"><span class="num">${s.typeCount.image || 0}</span><span class="lbl">画 · 图像</span></div>
          <div class="storage-stat"><span class="num">${s.typeCount.binary || 0}</span><span class="lbl">物 · 二进制</span></div>
        </div>
      </div>

      <div class="storage-card">
        <h3>四核活动</h3>
        <div style="font-size:12px;color:var(--ink-soft);line-height:1.9;">
          <div>[刃] 最近访问:<strong style="color:var(--rust);">${recent.length}</strong> 项</div>
          <div>[刃] 暂存草稿:<strong style="color:var(--rust);">${drafts.length}</strong> 份 ${drafts.length ? `(最新于 ${fmtRelTime(Math.max(...drafts.map(d => d.ts)))})` : ''}</div>
          <div>[笺] Cookie:<strong style="color:var(--rust);">${cookies.length}</strong> 条 ${cookies.map(c => c.name).join('、')}</div>
        </div>
      </div>

      <div class="storage-card">
        <h3>操作</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="fm-btn" onclick="StorageApp.refresh()">↻ 刷新</button>
          <button class="fm-btn" onclick="StorageApp.export()">↓ 导出全部</button>
          <button class="fm-btn" onclick="StorageApp.clearCache()">清空缓存</button>
          <button class="fm-btn danger" onclick="StorageApp.purge()">✕ 清空文件</button>
          <button class="fm-btn danger" onclick="StorageApp.purgeAll()">✕ 完全重置</button>
        </div>
        <div style="margin-top:12px;font-size:11px;color:var(--ink-soft);font-style:italic;">
          清空操作不可恢复 — 三思而行。
        </div>
      </div>
    `;
  },
  
  async export() {
    const all = await QingSi.fs.getAllNodes();
    const data = { 
      version: QingSi.version, exportedAt: Date.now(), 
      nodes: [], prefs: {}, cookies: QingSi.cookie?.listAll() || []
    };
    for (const n of all) {
      if (n.type === 'folder') data.nodes.push({ ...n, content: null });
      else {
        const blob = await QingSi.fs.readFile(n.path);
        const text = blob ? await blob.text().catch(() => null) : null;
        data.nodes.push({ ...n, content: text });
      }
    }
    // 收集 prefs
    if (QingSi.prefs?.available) {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k?.startsWith('qs:pref:')) data.prefs[k.slice(8)] = localStorage.getItem(k);
      }
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `qingsi-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('导出', '四核全部资料已导出', 'success');
  },
  
  clearCache() {
    QingSi.cache?.invalidateAll();
    toast('已清', '缓存已洗',  'info');
    this.refresh();
  },
  
  purge() {
    confirm('清空文件?', '所有文件与目录将被永久删除。', async () => {
      const all = await QingSi.fs.getAllNodes();
      for (const n of all) {
        if (n.path !== '/') await QingSi.fs._deleteNodeMeta(n.path).catch(() => {});
      }
      QingSi.fs._tx(['blobs'], 'readwrite').objectStore('blobs').clear();
      if (QingSi.fs.useOPFS) {
        for await (const [name] of QingSi.fs.opfsRoot.entries()) {
          await QingSi.fs.opfsRoot.removeEntry(name, { recursive: true }).catch(() => {});
        }
      }
      toast('已清', '万物归零', 'info');
      this.refresh();
      if (QingSi.windows.files) fileManager.refresh();
    });
  },
  
  purgeAll() {
    confirm('完全重置?', '将清空文件、偏好、草稿、Cookie 一切痕迹。', async () => {
      await this.purge();
      QingSi.prefs?.purgeAll();
      QingSi.cookie?.purgeAll();
      toast('已尽', '青丝重归空无', 'info');
      setTimeout(() => location.reload(), 1500);
    });
  }
};

/* ============================================================
   桌面交互 + 时钟 + 欢迎语
   ============================================================ */
function startClock() {
  const clock = document.getElementById('clock');
  const solar = document.getElementById('solar');
  const update = () => {
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    clock.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    const months = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
    solar.textContent = months[d.getMonth()] + ' · ' + d.getDate() + '日';
  };
  update();
  setInterval(update, 1000);
}

function updateGreeting() {
  const name = QingSi.cookie?.get('user_name');
  const greet = document.getElementById('greeting');
  if (name && greet) {
    const h = new Date().getHours();
    const period = h < 6 ? '夜深' : h < 11 ? '早安' : h < 14 ? '午时' : h < 18 ? '午后' : h < 22 ? '晚安' : '夜深';
    greet.textContent = `${period},${name}`;
  } else if (greet) {
    greet.textContent = '';
  }
}

function spawnPetals() {
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (8 + Math.random() * 8) + 's';
    p.style.background = ['#7a8b6f', '#a8553a', '#6b3a4a'][Math.floor(Math.random() * 3)];
    document.getElementById('desktop').appendChild(p);
    setTimeout(() => p.remove(), 16000);
  }, 2500);
}

function bindAppLaunchers() {
  const launch = (app) => {
    switch (app) {
      case 'files': fileManager.open(); break;
      case 'editor': EditorApp.open(); break;
      case 'image': ImageApp.open(); break;
      case 'terminal': TerminalApp.open(); break;
      case 'storage': StorageApp.open(); break;
      case 'poem': PoemApp.open(); break;
      case 'settings': SettingsApp.open(); break;
    }
  };
  document.querySelectorAll('.desk-icon').forEach(el => {
    el.ondblclick = () => launch(el.dataset.app);
  });
  document.querySelectorAll('.dock-item').forEach(el => {
    el.onclick = () => launch(el.dataset.app);
  });
}

async function updateStorageMeta() {
  const s = await QingSi.fs.stats();
  document.getElementById('storage-meta').textContent = 
    `${s.fileCount} 笺 · ${fmtSize(s.totalSize)}`;
}

function updateCoreLights() {
  ['opfs','idb','ls','ck'].forEach(c => {
    const el = document.getElementById('core-' + c);
    if (el) el.classList.toggle('active', QingSi.cores[c]);
  });
}

function showWelcomeIfNeeded() {
  // 第一次访问 / 主动设置显示
  const welcomed = QingSi.cookie?.hasOnce('welcomed');
  const showAlways = QingSi.prefs?.get('showWelcome', false);
  
  if (welcomed && !showAlways) return;
  
  const overlay = document.createElement('div');
  overlay.className = 'welcome-overlay';
  overlay.innerHTML = `
    <div class="welcome-card">
      <h1>青丝</h1>
      <div class="sub">— 四核纪元 · QuadCore —</div>
      <div class="desc">
        欢迎来到 青丝 OS。<br><br>
        此系统由<strong>四位剑客</strong>共同守护:
        <strong style="color:var(--rust);">真文剑、索引盾、疾风刃、羽信笺</strong>。<br><br>
        请赐尊号,以便青丝铭记于心:
      </div>
      <input class="name-input" id="welcome-name" placeholder="请赐尊号..." value="青丝主人">
      <button class="fm-btn primary" id="welcome-ok" style="width:100%;padding:10px;">入此青丝之境</button>
    </div>
  `;
  document.body.appendChild(overlay);
  
  const inp = overlay.querySelector('#welcome-name');
  inp.focus(); inp.select();
  
  const submit = () => {
    const name = inp.value.trim() || '青丝主人';
    QingSi.cookie?.set('user_name', name, { maxAge: 31536000 });
    QingSi.cookie?.markOnce('welcomed', 365);
    overlay.style.opacity = 0;
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => overlay.remove(), 500);
    updateGreeting();
    toast('记下了', `${name},一切都为你而设`, 'success');
  };
  
  overlay.querySelector('#welcome-ok').onclick = submit;
  inp.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
}

(async function bootstrap() {
  // 先点亮疾风刃和羽信笺(同步可用)
  QingSi.prefs = new PrefsManager();
  QingSi.cookie = new CookieManager();
  QingSi.cores.ls = QingSi.prefs.available;
  QingSi.cores.ck = QingSi.cookie.available;
  QingSi.sync = new SyncManager();
  
  document.getElementById('sc-3').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  document.getElementById('sc-4').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  
  // 初始化主从核
  QingSi.fs = new HybridFS();
  await QingSi.fs.init();
  QingSi.cache = new CacheCoordinator(QingSi.prefs);
  
  document.getElementById('sc-2').classList.add('lit');
  await new Promise(r => setTimeout(r, 200));
  if (QingSi.cores.opfs) document.getElementById('sc-1').classList.add('lit');
  
  startClock();
  updateGreeting();
  spawnPetals();
  bindAppLaunchers();
  updateStorageMeta();
  updateCoreLights();
  setInterval(updateStorageMeta, 5000);
  
  // 全局同步监听
  QingSi.sync.on((evt) => {
    console.log('[sync]', evt);
    if (evt.type === 'fs:written' || evt.type === 'fs:created' || evt.type === 'fs:deleted') {
      updateStorageMeta();
    }
  });
  
  // 关闭启动屏
  setTimeout(() => {
    const splash = document.getElementById('splash');
    splash.style.opacity = 0;
    setTimeout(() => {
      splash.remove();
      showWelcomeIfNeeded();
    }, 800);
  }, 1800);
  
  console.log('%c 青丝 OS · 四核纪元 ', 'background:#1c1a17;color:#b08a4a;padding:10px 30px;font-size:20px;font-family:serif;letter-spacing:0.5em;');
  console.log('%c [剑] OPFS  [盾] IndexedDB  [刃] localStorage  [笺] Cookie ', 'color:#7a8b6f;font-style:italic;letter-spacing:0.2em;');
  console.log('%c 「四核合璧,可纳乾坤,可守记忆,可通万域,可越时光。」', 'color:#a8553a;font-style:italic;');
})();
</script>
